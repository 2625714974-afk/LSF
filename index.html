<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>高考加油</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei",sans-serif;
}

body{
    overflow:hidden;
}

/* 首页 */
#home{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.letter{
    position:relative;
    z-index:999;

    width:90%;
    max-width:700px;

    background:
    linear-gradient(
    145deg,
    #fff8dc,
    #fffaf0);

    border-radius:25px;

    padding:40px;

    color:#333;

    box-shadow:
    0 0 40px rgba(255,215,0,.6);

    transform:scaleY(0);
    transform-origin:top;

    animation:
    openLetter 2s forwards;
}

.letter-header{
    text-align:center;
    margin-bottom:20px;
    color:#b8860b;
}

@keyframes openLetter{

    from{
        transform:scaleY(0);
        opacity:0;
    }

    to{
        transform:scaleY(1);
        opacity:1;
    }
}

.card{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,.95);
    padding:35px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.card h1{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
    margin-top:15px;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#667eea;
    color:#fff;
    font-size:18px;
}

#blessing{
    display:none;
    position:relative;
    height:100vh;
    background:linear-gradient(to bottom,#081229,#1e293b);
    justify-content:center;
    align-items:center;
}

canvas{
    position:absolute;
    left:0;
    top:0;
    z-index:1;
}

.message{
    position:relative;
    z-index:999;
    max-width:90%;
    padding:30px;
    text-align:center;
    line-height:1.8;
    color:#fff;
    border-radius:25px;

    background:rgba(255,255,255,.12);
    backdrop-filter:blur(12px);

    font-size:clamp(22px,5vw,42px);

    text-shadow:
        0 0 10px white,
        0 0 20px gold;
}

.gold-name{

    font-size:clamp(34px,8vw,70px);

    font-weight:bold;

    color:#ffd700;

    -webkit-text-stroke:2px #fff;

    text-shadow:
        0 0 10px #fff,
        0 0 20px #ffd700,
        0 0 40px #ffd700,
        0 0 80px #ffea00;

    animation:
        glow 2s infinite alternate;
}

@keyframes glow{

    from{
        filter:brightness(1);
    }

    to{
        filter:brightness(1.4);
    }
}

#musicBtn{
    position:fixed;
    top:15px;
    right:15px;
    z-index:1000;

    width:55px;
    height:55px;

    border:none;
    border-radius:50%;

    background:rgba(255,255,255,.2);
    backdrop-filter:blur(10px);

    color:white;
    font-size:24px;
}

@media(max-width:768px){

    .card{
        padding:25px;
    }

    .message{
        padding:20px;
        font-size:24px;
    }
}
</style>
</head>

<body>

<div id="home">

    <div class="card">

        <h1>🎓 高考加油 🎓</h1>

        <input
            id="name"
            type="text"
            placeholder="请输入姓名">

        <button onclick="startBlessing()">
            开启祝福
        </button>

    </div>

</div>

<div id="blessing">

    <canvas id="fireworks"></canvas>

    <button id="musicBtn">
        🎵
    </button>

    <div class="letter" id="letter">

    <div class="letter-header">
        <h1>🎓 录取通知书 🎓</h1>
    </div>

    <div class="message" id="msg"></div>

</div>

</div>

<audio
id="bgm"
loop
preload="auto"
playsinline
webkit-playsinline>

<source src="1/1.mp3" type="audio/mpeg">

</audio>

<script>

const bgm =
document.getElementById("bgm");

document.getElementById("musicBtn")
.onclick = function(){

    if(bgm.paused){
        bgm.play();
    }else{
        bgm.pause();
    }
};

function startBlessing(){

    let name =
    document.getElementById("name")
    .value.trim();

    if(!name){

        alert("请输入姓名");
        return;
    }

    if(navigator.vibrate){
        navigator.vibrate(200);
    }

    bgm.play().catch(()=>{});

    document.getElementById("home")
    .style.display="none";

    document.getElementById("blessing")
    .style.display="flex";

    document.getElementById("msg")
    .innerHTML = `
    🎓 <span class="gold-name">
${name}
</span>🎓
    <br><br>
    高考加油！
    <br><br>
    虽然我经常诋毁你，
    <br>
    但你一定要相信自己。
    <br><br>
    你之前的所有努力，
    <br>
    都将在这一刻绽放光芒。
    <br><br>
    愿你笔下生花，
    <br>
    金榜题名！
    <br><br>
    ✨ 前程似锦 ✨
    `;

    initFireworks();
}

let particles = [];

function initFireworks(){

    const canvas =
    document.getElementById("fireworks");

    const ctx =
    canvas.getContext("2d");

    canvas.width =
    window.innerWidth;

    canvas.height =
    window.innerHeight;

    class Particle{

        constructor(x,y,color){

            this.x=x;
            this.y=y;
            this.color=color;

            this.vx=
            (Math.random()-0.5)*8;

            this.vy=
            (Math.random()-0.5)*8;

            this.life=100;
        }

        update(){

            this.x+=this.vx;
            this.y+=this.vy;

            this.vy+=0.03;

            this.life--;
        }

        draw(){

            ctx.beginPath();

            ctx.arc(
                this.x,
                this.y,
                2,
                0,
                Math.PI*2
            );

            ctx.fillStyle=this.color;
            ctx.fill();
        }
    }

    function firework(){

        let x =
        Math.random()*canvas.width;

        let y =
        Math.random()*canvas.height*0.5;

        let colors=[
            "#ff0000",
            "#ffff00",
            "#00ff00",
            "#00ffff",
            "#ff00ff",
            "#ffffff",
            "#ffa500"
        ];

        let color =
        colors[
        Math.floor(
        Math.random()*colors.length)];

        const count =
        window.innerWidth < 768
        ? 60
        : 150;

        for(let i=0;i<count;i++){

            particles.push(
            new Particle(
            x,y,color));
        }
    }

    function animate(){

        ctx.fillStyle=
        "rgba(0,0,0,0.15)";

        ctx.fillRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        particles.forEach(
        (p,index)=>{

            p.update();
            p.draw();

            if(p.life<=0){
                particles.splice(index,1);
            }
        });

        requestAnimationFrame(
        animate);
    }

    animate();

    for(let i=0;i<5;i++){

        setTimeout(
        firework,
        i*400);
    }

    setInterval(
        firework,
        1000);
}

window.addEventListener(
"resize",
()=>{

    const canvas =
    document.getElementById("fireworks");

    canvas.width =
    window.innerWidth;

    canvas.height =
    window.innerHeight;
});
</script>

</body>
</html>
